<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Science Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/shared.css">
<link rel="stylesheet" href="student.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">🔬 My Science Games</div>
    <div class="topbar-right">
      <button id="badgesNavBtn" class="badges-nav-btn">🏅 My Badges</button>
      <span id="userName" class="user-name"></span>
      <button id="logoutBtn" class="logout-btn">Log out</button>
    </div>
  </div>
</header>

<main class="page">

  <!-- ============ CHALLENGE LIST ============ -->
  <section id="topicListView">
    <h1 class="page-title">Your Challenges 🎮</h1>
    <div id="featuredChallengeBanner"></div>
    <div id="topicList" class="topic-grid"></div>
    <div id="topicListEmpty" class="empty-state hidden">
      <div class="empty-emoji">📭</div>
      <p>No challenges yet! Ask your teacher to assign a topic.</p>
    </div>
  </section>

  <!-- ============ GAME HUB (3 games for one challenge) ============ -->
  <section id="gameHubView" class="hidden">
    <button class="back-link" id="backToTopics">← All challenges</button>
    <h1 class="page-title" id="hubTopicTitle"></h1>
    <div class="game-picker" id="gamePicker"></div>
    <div class="game-panel" id="gamePanel"></div>
  </section>

  <!-- ============ MY BADGES ============ -->
  <section id="badgeShelfView" class="hidden">
    <button class="back-link" id="backToTopicsFromBadges">← All challenges</button>
    <h1 class="page-title">My Badges 🏅</h1>
    <div id="badgeShelfContent"></div>
  </section>

</main>

<div id="badgeCelebration" class="badge-celebration hidden"></div>

<script src="../shared/api.js"></script>
<script src="student.js"></script>
</body>
</html>
