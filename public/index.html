<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Game Kit — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/shared.css">
<style>
  :root{
    /* Shared blue → white theme (matches all three dashboards) */
    --blue-900: #0C2D6B; --blue-800: #143C86; --blue-700: #1D4ED8;
    --blue-500: #3B82F6; --blue-400: #38BDF8; --blue-200: #C7E4FF;
    --blue-100: #E4F1FF; --blue-50: #F5FAFF;
    --muted: #5A7BA8; --border: #DCEAFB; --ink: #0C2D6B;
  }
  body{ font-family: 'Inter', sans-serif; background: linear-gradient(160deg, #0C2D6B 0%, #143C86 55%, #1D4ED8 100%); background-attachment: fixed; min-height: 100vh; color: var(--ink); }
  .wrap{ max-width: 420px; margin: 0 auto; padding: 60px 20px 40px; }
  .logo{ text-align: center; margin-bottom: 28px; }
  .logo h1{ font-family: 'Fraunces', serif; font-weight: 600; color: #fff; font-size: 28px; margin: 0; }
  .logo p{ color: #BAD4FF; font-size: 14px; margin-top: 6px; font-weight: 500; }

  .card{ background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 22px 55px rgba(6,24,66,0.45); }

  .role-tabs{ display: flex; gap: 6px; margin-bottom: 22px; background: var(--blue-50); padding: 4px; border-radius: 12px; }
  .role-tab{ flex: 1; text-align: center; padding: 10px 6px; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 13px; color: var(--muted); border: none; background: none; }
  .role-tab.active{ background: linear-gradient(135deg, var(--blue-500), var(--blue-700)); color: #fff; }

  .mode-toggle{ display: flex; justify-content: center; gap: 18px; margin-bottom: 20px; font-size: 14px; font-weight: 600; }
  .mode-btn{ background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px 2px; border-bottom: 2px solid transparent; }
  .mode-btn.active{ color: var(--blue-700); border-bottom-color: var(--blue-400); }

  form{ display: flex; flex-direction: column; gap: 12px; }
  label{ font-size: 13px; font-weight: 700; color: var(--blue-900); margin-bottom: -6px; }
  input{ font-size: 15px; padding: 12px 14px; border-radius: 10px; border: 2px solid var(--border); outline: none; background: var(--blue-50); width: 100%; }
  input:focus{ border-color: var(--blue-400); }

  .submit-btn{
    font-weight: 700; font-size: 15px; background: linear-gradient(135deg, var(--blue-500), var(--blue-700)); color: #fff; border: none;
    padding: 13px; border-radius: 10px; cursor: pointer; margin-top: 6px;
    box-shadow: 0 4px 14px rgba(29,78,216,0.4); display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .1s ease, box-shadow .1s ease;
  }
  .submit-btn:hover{ box-shadow: 0 6px 18px rgba(29,78,216,0.48); }
  .submit-btn:active{ transform: translateY(1px); box-shadow: 0 2px 8px rgba(29,78,216,0.4); }
  .submit-btn:disabled{ opacity: 0.7; cursor: progress; }

  /* Google button — styled to Google's own brand guidelines */
  .google-btn{
    width: 100%; font-weight: 600; font-size: 15px; background: #fff; color: #3c4043;
    border: 1.5px solid #dadce0; padding: 12px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 8px; transition: background .12s ease;
  }
  .google-btn:hover{ background: #f8f9fa; }
  .google-btn svg{ width: 18px; height: 18px; flex-shrink: 0; }

  /* Divider between Google button and email form */
  .divider{ display: flex; align-items: center; gap: 10px; margin: 14px 0 6px; }
  .divider hr{ flex: 1; border: none; border-top: 1.5px solid var(--border); }
  .divider span{ font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }

  /* Only show Google button for teacher/parent, not student */
  .google-section{ display: block; }
  .google-section.hidden{ display: none; }

  .field-error{ color: #B3402A; font-size: 13px; font-weight: 600; min-height: 18px; }
  .hint{ font-size: 12px; color: var(--muted); margin-top: -4px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">
    <h1>🔬 Science Game Kit</h1>
    <p>For teachers, students, and parents</p>
  </div>

  <div class="card">
    <div class="role-tabs" id="roleTabs">
      <button class="role-tab active" data-role="teacher" type="button">👩‍🏫 Teacher</button>
      <button class="role-tab" data-role="student" type="button">🧒 Student</button>
      <button class="role-tab" data-role="parent" type="button">👪 Parent</button>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="login" type="button">Log in</button>
      <button class="mode-btn" data-mode="signup" type="button">Sign up</button>
    </div>

    <!-- Google sign-in (only shown for teacher + parent tabs) -->
    <div class="google-section" id="googleSection">
      <button type="button" class="google-btn" id="googleBtn">
        <!-- Google's official "G" logo SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">
        <hr /><span>or</span><hr />
      </div>
    </div>

    <form id="authForm">
      <!-- LOGIN fields -->
      <div data-mode-section="login">
        <label id="identifierLabel">Email</label>
        <input type="text" id="identifierInput" autocomplete="username" />
      </div>
      <div data-mode-section="login">
        <label>Password</label>
        <input type="password" id="loginPasswordInput" autocomplete="current-password" />
      </div>

      <!-- SIGNUP fields -->
      <div data-mode-section="signup">
        <label>Your name</label>
        <input type="text" id="nameInput" autocomplete="name" />
      </div>
      <div data-mode-section="signup" data-role-section="teacher parent">
        <label>Email</label>
        <input type="email" id="emailInput" autocomplete="email" />
      </div>
      <div data-mode-section="signup" data-role-section="student">
        <label>Choose a username</label>
        <input type="text" id="usernameInput" autocomplete="username" />
        <div class="hint">At least 3 characters. No spaces.</div>
      </div>
      <div data-mode-section="signup" data-role-section="student">
        <label>Class code</label>
        <input type="text" id="classCodeInput" placeholder="e.g. FOX-1234" style="text-transform: uppercase;" />
        <div class="hint">Ask your teacher for this.</div>
      </div>
      <div data-mode-section="signup">
        <label>Password</label>
        <input type="password" id="signupPasswordInput" autocomplete="new-password" />
        <div class="hint">At least 8 characters.</div>
      </div>

      <div class="field-error" id="fieldError"></div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span id="submitLabel">Log in</span>
      </button>
    </form>
  </div>
</div>

<script src="shared/api.js"></script>
<script>
  let currentRole = 'teacher';
  let currentMode = 'login';

  const roleTabs = document.querySelectorAll('.role-tab');
  const modeBtns = document.querySelectorAll('.mode-btn');
  const form = document.getElementById('authForm');
  const submitBtn = document.getElementById('submitBtn');
  const submitLabel = document.getElementById('submitLabel');
  const fieldError = document.getElementById('fieldError');
  const identifierLabel = document.getElementById('identifierLabel');
  const googleSection = document.getElementById('googleSection');
  const googleBtn = document.getElementById('googleBtn');

  // ---- Handle token passed back in URL hash after Google OAuth ----
  // When Google redirects back to /teacher/index.html#token=...&displayName=...&role=...
  // those dashboards read the hash and store the session. But if somehow we land
  // on the login page with a hash (e.g. an error redirect), handle that too.
  const urlParams = new URLSearchParams(window.location.search);
  const oauthError = urlParams.get('error');
  if (oauthError) {
    document.getElementById('fieldError').textContent = decodeURIComponent(oauthError);
  }

  // If already logged in, go straight to the right dashboard
  if (Auth.isLoggedIn()) {
    redirectToDashboard(Auth.getUser().role);
  }

  function redirectToDashboard(role) {
    const map = { teacher: 'teacher/index.html', student: 'student/index.html', parent: 'parent/index.html' };
    window.location.href = map[role];
  }

  function updateVisibility() {
    document.querySelectorAll('[data-mode-section]').forEach(el => {
      el.classList.toggle('hidden', el.dataset.modeSection !== currentMode);
    });
    document.querySelectorAll('[data-role-section]').forEach(el => {
      const roles = el.dataset.roleSection.split(' ');
      const showForRole = roles.includes(currentRole);
      const showForMode = el.dataset.modeSection === currentMode;
      el.classList.toggle('hidden', !(showForRole && showForMode));
    });

    // Google button only makes sense for teacher and parent — not student
    googleSection.classList.toggle('hidden', currentRole === 'student');
    identifierLabel.textContent = currentRole === 'student' ? 'Username' : 'Email';
    submitLabel.textContent = currentMode === 'login' ? 'Log in' : 'Sign up';
    fieldError.textContent = '';
  }

  roleTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      roleTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentRole = tab.dataset.role;
      updateVisibility();
    });
  });

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.dataset.mode;
      updateVisibility();
    });
  });

  updateVisibility();

  // ---- Google button click — redirect to backend which redirects to Google ----
  googleBtn.addEventListener('click', () => {
    // Navigate to the backend's Google OAuth start route,
    // passing the current role so the backend knows what account type to create
    window.location.href = `/api/auth/google?role=${currentRole}`;
  });

  // ---- Email/password form submit ----
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    fieldError.textContent = '';
    submitBtn.disabled = true;
    submitLabel.innerHTML = '<span class="spinner"></span>';

    try {
      let result;
      if (currentMode === 'login') {
        const identifier = document.getElementById('identifierInput').value.trim();
        const password = document.getElementById('loginPasswordInput').value;
        if (!identifier || !password) throw new Error('Please fill in both fields.');
        result = await apiCall('/api/auth/login', { method: 'POST', body: { identifier, password } });
      } else {
        const name = document.getElementById('nameInput').value.trim();
        const password = document.getElementById('signupPasswordInput').value;

        if (currentRole === 'student') {
          const username = document.getElementById('usernameInput').value.trim();
          const classCode = document.getElementById('classCodeInput').value.trim();
          result = await apiCall('/api/auth/signup/student', {
            method: 'POST',
            body: { username, password, name, classCode }
          });
        } else {
          const email = document.getElementById('emailInput').value.trim();
          result = await apiCall(`/api/auth/signup/${currentRole}`, {
            method: 'POST',
            body: { email, password, name }
          });
        }
      }

      Auth.setSession(result.token, result.user);
      redirectToDashboard(result.user.role);
    } catch (err) {
      fieldError.textContent = err.message;
    } finally {
      submitBtn.disabled = false;
      submitLabel.textContent = currentMode === 'login' ? 'Log in' : 'Sign up';
    }
  });
</script>
</body>
</html>
